services:
  backend:
    build:
      context: ./backend
    container_name: grid-backend
    volumes:
      - grid_data:/data
      - ./backend:/app
      - ./IEEE8500.xml:/app/IEEE8500.xml
    environment:
      - BOOTSTRAP_DATA=${BOOTSTRAP_DATA:-true}
      - DB_PATH=/data/grid_data_cim.duckdb
      - PARQUET_DIR=/data/cim_readings
      - CIM_MODEL_PATH=/app/IEEE8500.xml
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'

  frontend:
    build:
      context: ./frontend
    container_name: grid-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

  documentation:
    build:
      context: ./docs
    container_name: grid-docs
    ports:
      - "${WEBSITE_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  grid_data:

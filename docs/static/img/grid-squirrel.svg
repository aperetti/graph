<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#0f172a" />
  
  <!-- Power Grid Lines (Orthogonal/Branching) -->
  <g stroke="#22c55e" stroke-width="1" opacity="0.4" fill="none">
    <!-- Main Vertical Feed -->
    <path d="M50,10 V90" />
    <!-- Horizontal Branches -->
    <path d="M20,30 H80" />
    <path d="M10,60 H90" />
    <!-- Distribution Branches -->
    <path d="M20,30 V45 H5" />
    <path d="M80,30 V15 H95" />
    <path d="M30,60 V80 H15" />
    <path d="M70,60 V80 H85" />
  </g>
  
  <!-- Nodes (Substations) -->
  <g fill="#4ade80">
    <circle cx="50" cy="30" r="2" />
    <circle cx="50" cy="60" r="2" />
    <circle cx="20" cy="30" r="1.5" />
    <circle cx="80" cy="30" r="1.5" />
    <circle cx="5" cy="45" r="1" />
    <circle cx="95" cy="15" r="1" />
    <circle cx="15" cy="80" r="1" />
    <circle cx="85" cy="80" r="1" />
  </g>

  <!-- Squirrel Character -->
  <g transform="translate(25, 25) scale(0.5)">
    <!-- Body/Head -->
    <path d="M50,20 Q80,20 80,60 Q80,100 50,100 Q20,100 20,60 Q20,20 50,20 Z" fill="#f97316" />
    <!-- Ears -->
    <path d="M30,30 L20,5 L40,25 Z" fill="#ea580c" />
    <path d="M70,30 L80,5 L60,25 Z" fill="#ea580c" />
    <!-- Eyes -->
    <circle cx="38" cy="55" r="3" fill="white" />
    <circle cx="62" cy="55" r="3" fill="white" />
    <circle cx="38" cy="55" r="1.5" fill="black" />
    <circle cx="62" cy="55" r="1.5" fill="black" />
    <!-- Round Glasses with Bridge -->
    <g fill="none" stroke="#1e293b" stroke-width="3">
      <!-- Left Lens -->
      <circle cx="38" cy="55" r="9" />
      <!-- Right Lens -->
      <circle cx="62" cy="55" r="9" />
      <!-- Bridge -->
      <path d="M47,55 Q50,52 53,55" />
      <!-- Frame Arms -->
      <path d="M29,55 L20,55" />
      <path d="M71,55 L80,55" />
    </g>
    <!-- Nose -->
    <path d="M47,75 L53,75 L50,80 Z" fill="#1e293b" />
    <!-- Tail (Peek-a-boo) -->
    <path d="M80,80 Q100,60 90,40 Q80,20 70,40" fill="none" stroke="#f97316" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>

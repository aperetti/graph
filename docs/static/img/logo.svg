<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="48" fill="#0f172a" />
  

  
 <!-- Nodes (Substations) -->
  <g fill="#4ade80">
      <circle cx="50" cy="30" r="4" />
    <circle cx="50" cy="60" r="4" />
    <circle cx="20" cy="30" r="3" />
    <circle cx="80" cy="30" r="3" />
    <circle cx="5" cy="45" r="2" />    
    <circle cx="15" cy="80" r="2" />
    <circle cx="85" cy="80" r="2" />
  </g>

    <!-- Power Grid Lines (Orthogonal/Branching) -->
  <g stroke="#22c55e" stroke-width="2" opacity="0.4" fill="none">
    <!-- Main Vertical Feed -->
    <path d="M50,10 V90" />
    <!-- Horizontal Branches -->
    <path d="M20,30 H80" />
    <path d="M10,60 H90" />
    <!-- Distribution Branches -->
    <path d="M20,30 V45 H5" />
    <path d="M80, V15 H95" />
    <path d="M30,60 V80 H15" />
    <path d="M70,60 V80 H85" />
  </g>
  
  <g transform="translate(50, 65) scale(1.3)">
    
    <path d=",5 C35,-20 50,-5 40,15 C35,25 20,25 15,10" fill="#f97316" />
    
    <ellipse cx="-12" cy="-28" rx="7" ry="9" fill="#8b4513" transform="rotate(-10)" />
    <ellipse cx="12" cy="-28" rx="7" ry="9" fill="#8b4513" transform="rotate(10)" />
    
    <rect x="-20" y="-25" width="40" height="38" rx="14" fill="#a0522d" />
    
    <rect x="-22" y="-8" width="45" height="24" rx="10" fill="#d2b48c" />
    
    <g transform="translate(0, -13) scale(0.6)">
        <path d="M-12,-20 Q-12,-35 0,-35 Q12,-35 12,-20 Z" fill="#ffffff" />
        <rect x="-14" y="-22" width="28" height="3" rx="1.5" fill="#cbd5e1" />
    </g>

    <g transform="translate(0,-2)">
    <g fill="none" stroke="#1e293b" stroke-width="2.5">
      <circle cx="-9" cy="-5" r="8" /> <circle cx="9" cy="-5" r="8" />  <path d="M-1,-5 Q0,-6 1,-5" />  </g>

    <circle cx="-9" cy="-5" r="3" fill="#1e293b" />
    <circle cx="9" cy="-5" r="3" fill="#1e293b" />
    </g>
    <circle cx="0" cy="2" r="2.5" fill="#1e293b" />
    
    <rect x="-2" y="7" width="4" height="5" rx="0.5" fill="#ffffff" />
  </g>
</svg>